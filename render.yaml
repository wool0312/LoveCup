databases:
  - name: lovecup-db
    plan: free
    databaseName: lovecup
    user: lovecup

services:
  - type: web
    name: lovecup
    runtime: python
    plan: free
    buildCommand: bash build.sh
    startCommand: cd backend && gunicorn app.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: LOVECUP_DATABASE_URL
        fromDatabase:
          name: lovecup-db
          property: connectionURI
      - key: LOVECUP_CORS_ORIGINS
        value: ""
      - key: NODE_VERSION
        value: "22"
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: FOOTBALL_DATA_API_TOKEN
        sync: false
